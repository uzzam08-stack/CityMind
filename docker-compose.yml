version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEMO_MODE=true
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-citymind-demo}
      - BIGQUERY_DATASET=${BIGQUERY_DATASET:-pcmc_smart_city}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - VERTEX_AI_ENDPOINT=${VERTEX_AI_ENDPOINT:-}
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
      - DEMO_MODE=true
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    restart: unless-stopped
